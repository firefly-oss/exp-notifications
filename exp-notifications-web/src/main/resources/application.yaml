spring:
  application:
    name: exp-notifications
    version: 1.0.0
    description: Experience layer API for notification preferences and notification history
    team:
      name: Firefly Software Foundation
      email: dev@getfirefly.io
  threads:
    virtual:
      enabled: true
  # ---- DEMO ONLY: Redis disabled (no spring.data.redis is set, but the autoconfig still
  # tries localhost:6379 if the classes are on the classpath). Restore when Redis is reachable.
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisReactiveAutoConfiguration

# ---- DEMO ONLY: idempotency cache forced to Caffeine so the AUTO resolver does NOT pick Redis. ----
firefly:
  cache:
    enabled: true
    default-cache-type: CAFFEINE
    redis:
      enabled: false

api-configuration:
  domain-platform:
    common-notifications:
      base-path: ${ENDPOINT_DOMAIN_COMMON_NOTIFICATIONS:http://localhost:8095}
      timeout: 5s

springdoc:
  packages-to-scan: com.firefly.experience.notifications.web.controllers
  paths-to-match: /api/**
  swagger-ui:
    path: /swagger-ui.html
    tagsSorter: alpha
    operationsSorter: method
    docExpansion: none
    filter: true

server:
  port: ${SERVER_PORT:8104}
  address: ${SERVER_ADDRESS:localhost}
  shutdown: graceful

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true
  health:
    livenessState:
      enabled: true
    readinessState:
      enabled: true

logging:
  level:
    root: INFO
    com.firefly.experience.notifications: DEBUG

---
spring:
  config:
    activate:
      on-profile: dev
logging:
  level:
    com.firefly: DEBUG

---
spring:
  config:
    activate:
      on-profile: pro
logging:
  level:
    com.firefly: INFO
springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false
